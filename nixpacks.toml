[phases.setup]
nixPkgs = ["nodejs_20", "jdk17", "wget"]

[phases.build]
cmds = [
    "npm install",
    "npm run build",
    "cd api && npm install",
    "echo '=== Download Audiveris JAR ==='",
    "mkdir -p /app/audiveris",
    "wget -q https://github.com/Audiveris/audiveris/releases/download/5.11.0/Audiveris-5.11.0.jar -O /app/audiveris/audiveris.jar || echo 'JAR download failed'",
    "ls -la /app/audiveris/"
]

[start]
cmd = "node api/index.js"

[variables]
AUDIVERIS_PATH = "java -jar /app/audiveris.jar"
